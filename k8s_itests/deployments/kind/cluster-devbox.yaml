    labels: &worker-labels
      yelp.com/pool: default
    extraMounts: &worker-mounts
      - hostPath: /nail/etc
        containerPath: /nail/etc
  - role: worker
    labels: *worker-labels
    extraMounts: *worker-mounts
  - role: worker
    labels: *worker-labels
    extraMounts: *worker-mounts
  - role: worker
    labels: *worker-labels
    extraMounts: *worker-mounts
  - role: worker
    labels: *worker-labels
    extraMounts: *worker-mounts
  - role: worker
    labels: *worker-labels
    extraMounts: *worker-mounts
