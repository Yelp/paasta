canary:
  job_type: stateful
  service_type: application
  deploy_group: pnw-devc.canary
  pool: flink-spot
  checkpoint_path: file:///tmp/flink-checkpoints
  savepoint_path: file:///tmp/flink-savepoints
  udf_plugin_name: 'canary_noop'
  udf_plugin_version: '1.0.0'
  flink_supervisor:
    cpus: 0.1
    mem: 512
  jobmanager:
    cpus: 0.5
    mem: 2048
  taskmanager:
    cpus: 1
    mem: 4096
    slots: 4
    instances: 1
    logging_level: INFO
  env:
    IS_FLINKV2_ENABLED: "true"
  flink_conf:
    state.checkpoints.num-retained: "3"
    execution.checkpointing.interval: "300000"
    execution.checkpointing.timeout: "1800000"
    execution.checkpointing.tolerable-failed-checkpoints: "5"
    state.backend.type: rocksdb
    s3.aws.credentials.provider: com.amazonaws.auth.EnvironmentVariableCredentialsProvider
    fs.s3a.aws.credentials.provider: com.amazonaws.auth.EnvironmentVariableCredentialsProvider
    fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
    rest.flamegraph.enabled: "true"
    table.exec.sink.upsert-materialize: NONE
  jobs:
    data_hydration_biz_video_like_v1_clone_for_canary:
      sql: |
        SET 'execution.runtime-mode' = 'streaming';
        CREATE TEMPORARY SYSTEM FUNCTION canary_noop AS 'canary_noop_pyudf.canary_noop' LANGUAGE PYTHON;
        CREATE CATALOG paimon_source WITH (
            'type' = 'paimon',
            'warehouse' = 's3://streamhouse-mysql-yelp-video-contribution-dev/warehouse_v1'
        );
        CREATE CATALOG paimon_sink WITH (
            'type' = 'paimon',
            'warehouse' = 'file:///tmp/paimon-warehouse'
        );
        CREATE DATABASE IF NOT EXISTS paimon_sink.biz_video_like;
        CREATE TABLE IF NOT EXISTS paimon_sink.biz_video_like.biz_video_like_join (
            id INT,
            video_id INT,
            business_id INT,
            __internal__op_ts BIGINT,
            dt VARCHAR,
            PRIMARY KEY (`business_id`, `dt`) NOT ENFORCED
        ) WITH (
          'sequence.field' = '__internal__op_ts'
        );
        INSERT INTO paimon_sink.biz_video_like.biz_video_like_join
        SELECT
            COALESCE(bvl.id, 0) AS id,
            COALESCE(bvl.video_id, 0) AS video_id,
            COALESCE(bv.business_id, 0) AS business_id,
            GREATEST(bvl.__internal__op_ts, bv.__internal__op_ts) AS __internal__op_ts,
            canary_noop(date_format(TO_TIMESTAMP_LTZ(bvl.time_created, 0), 'yyyy-MM-dd')) AS dt
        FROM paimon_source.yelp_video_contribution.biz_video_like /*+ OPTIONS('consumer-id' = 'flink.streamhouse_queries.canary.data_hydration_biz_video_like_v1_clone_for_canary.local') */ bvl
        INNER JOIN paimon_source.yelp_video_contribution.biz_video /*+ OPTIONS('consumer-id' = 'flink.streamhouse_queries.canary.data_hydration_biz_video_like_v1_clone_for_canary.local') */ bv
        ON bvl.video_id = bv.id;
