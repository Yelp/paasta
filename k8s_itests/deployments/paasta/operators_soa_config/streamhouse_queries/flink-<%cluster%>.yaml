canary:
  app_type: streamhouse
  job_type: testing
  service_type: application
  deploy_group: pnw-devc.canary
  pool: flink-spot
  checkpoint_path: s3://yelp-streamhouse-playground-dev-us-west-2/paimon/nathanleigh/flink-checkpoints/
  savepoint_path: s3://yelp-streamhouse-playground-dev-us-west-2/paimon/nathanleigh/flink-savepoints/
  always_allow_non_restored_state: true
  udf_plugin_name: 'canary_noop'
  udf_plugin_version: '1.0.0'
  flink_supervisor:
    cpus: 1
    disk: 4096
    mem: 4096
  jobmanager:
    cpus: 0.5
    mem: 2048
  taskmanager:
    cpus: 1
    mem: 4096
    slots: 4
    instances: 1
    logging_level: INFO
  env:
    IS_FLINKV2_ENABLED: "true"
  flink_conf:
    state.checkpoints.num-retained: "3"
    execution.checkpointing.interval: "60000"
    execution.checkpointing.timeout: "600000"
    execution.checkpointing.tolerable-failed-checkpoints: "5"
    execution.checkpointing.externalized-checkpoint-retention: "RETAIN_ON_CANCELLATION"
    state.backend.type: rocksdb
    s3.aws.credentials.provider: com.amazonaws.auth.EnvironmentVariableCredentialsProvider
    fs.s3a.aws.credentials.provider: com.amazonaws.auth.EnvironmentVariableCredentialsProvider
    fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
    rest.flamegraph.enabled: "true"
    table.exec.sink.upsert-materialize: NONE
  jobs:
    playground_datagen_test:
      sql: |
        SET 'execution.runtime-mode' = 'streaming';
        CREATE TABLE datagen_source (
            order_id INT,
            user_id INT,
            amount DOUBLE,
            order_time AS PROCTIME()
        ) WITH (
            'connector' = 'datagen',
            'rows-per-second' = '10',
            'fields.order_id.kind' = 'sequence',
            'fields.order_id.start' = '1',
            'fields.order_id.end' = '1000000',
            'fields.user_id.kind' = 'random',
            'fields.user_id.min' = '1',
            'fields.user_id.max' = '100',
            'fields.amount.kind' = 'random',
            'fields.amount.min' = '1',
            'fields.amount.max' = '500'
        );
        CREATE CATALOG paimon_sink WITH (
            'type' = 'paimon',
            'warehouse' = 's3://yelp-streamhouse-playground-dev-us-west-2/paimon/nathanleigh/warehouse'
        );
        CREATE DATABASE IF NOT EXISTS paimon_sink.playground;
        CREATE TABLE IF NOT EXISTS paimon_sink.playground.order_aggregates (
            user_id INT,
            order_count BIGINT,
            total_amount DOUBLE,
            PRIMARY KEY (user_id) NOT ENFORCED
        );
        INSERT INTO paimon_sink.playground.order_aggregates
        SELECT
            user_id,
            COUNT(*) AS order_count,
            SUM(amount) AS total_amount
        FROM datagen_source
        GROUP BY user_id;
