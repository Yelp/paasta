main:
  job_type: stateful
  service_type: application
  deploy_group: pnw-devc.main
  pool: flink-spot
  max_launcher_threads: 5
  supervisor_ready_check: true
  flink_supervisor:
    cpus: 0.1
    mem: 512
  jobmanager:
    cpus: 0.2
    mem: 2048
  taskmanager:
    cpus: 0.2
    mem: 2048
    slots: 1
    instances: 1
    logging_level: INFO
  flink_conf:
    state.checkpoints.num-retained: "3"
